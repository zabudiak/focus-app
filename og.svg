<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1c3a55"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#d4e7ff" stop-opacity=".7"/>
      <stop offset="1" stop-color="#d4e7ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Ambient backdrop dust -->
  <g fill="#fff" opacity=".35">
    <circle cx="120"  cy="80"  r="1.5"/>
    <circle cx="240"  cy="180" r="1"/>
    <circle cx="980"  cy="120" r="1.2"/>
    <circle cx="1080" cy="280" r="1.4"/>
    <circle cx="150"  cy="420" r="1"/>
    <circle cx="1050" cy="500" r="1.3"/>
    <circle cx="400"  cy="80"  r="1"/>
    <circle cx="780"  cy="40"  r="1.3"/>
    <circle cx="350"  cy="540" r="1.1"/>
    <circle cx="930"  cy="560" r="1"/>
  </g>
  <!-- Constellation -->
  <g transform="translate(600 250)" stroke="rgba(212,231,255,.45)" stroke-width="1.4" stroke-linecap="round" fill="none">
    <line x1="-200" y1="-30" x2="-90"  y2="-80"/>
    <line x1="-90"  y1="-80" x2="40"   y2="-20"/>
    <line x1="40"   y1="-20" x2="170"  y2="-70"/>
    <line x1="40"   y1="-20" x2="-20"  y2="90"/>
    <line x1="-20"  y1="90"  x2="-150" y2="120"/>
  </g>
  <g transform="translate(600 250)" fill="#d4e7ff">
    <circle cx="-200" cy="-30"  r="40" fill="url(#glow)"/><circle cx="-200" cy="-30"  r="9"/>
    <circle cx="-90"  cy="-80"  r="48" fill="url(#glow)"/><circle cx="-90"  cy="-80"  r="11"/>
    <circle cx="40"   cy="-20"  r="60" fill="url(#glow)"/><circle cx="40"   cy="-20"  r="14" fill="#fff"/>
    <circle cx="170"  cy="-70"  r="40" fill="url(#glow)"/><circle cx="170"  cy="-70"  r="9"/>
    <circle cx="-20"  cy="90"   r="44" fill="url(#glow)"/><circle cx="-20"  cy="90"   r="10"/>
    <circle cx="-150" cy="120"  r="36" fill="url(#glow)"/><circle cx="-150" cy="120"  r="8"/>
  </g>
  <text x="600" y="480" text-anchor="middle" fill="#eef3ff" font-family="-apple-system,'SF Pro Display','Inter',Segoe UI,sans-serif" font-size="86" font-weight="500" letter-spacing="-1">Constellation</text>
  <text x="600" y="540" text-anchor="middle" fill="#9aa8bc" font-family="-apple-system,'SF Pro Text','Inter',Segoe UI,sans-serif" font-size="26" letter-spacing="4">A QUIET FOCUS TIMER</text>
</svg>
